<!DOCTYPE html>
<html>
<head>
  <title>사이트 목록</title>
  <script src="script.js" defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    /* 로그인 버튼 */
    #open-login {
      padding: 8px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #open-login:hover {
      background: #45a049;
    }

    /* 모달 배경 */
    #login-modal {
      display: none; /* 처음에는 숨김 */
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    /* 모달 박스 */
    #login-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    /* 입력창 스타일 */
    #login-box input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* 버튼 스타일 */
    #login-box button {
      padding: 8px 16px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #login-box button[type="submit"] {
      background: #4CAF50;
      color: white;
    }
    #login-box button[type="button"] {
      background: #f44336;
      color: white;
    }

    /* 애니메이션 */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>사이트 목록</h1>

  <!-- 로그인 버튼 -->
  <button id="open-login">관리자 로그인</button>

  <!-- 로그인 모달 -->
  <div id="login-modal">
    <div id="login-box">
      <h2>관리자 로그인</h2>
      <form id="login-form">
        <input type="text" id="username" placeholder="아이디" /><br>
        <input type="password" id="password" placeholder="패스워드" /><br>
        <button type="submit">로그인</button>
        <button type="button" id="close-login">닫기</button>
      </form>
    </div>
  </div>

  <!-- 사이트 목록 테이블 -->
  <table border="1" id="site-table">
    <thead>
      <tr>
        <th>이름</th>
        <th>주소</th>
        <th id="admin-header" style="display:none;">관리</th>
      </tr>
    </thead>
    <tbody id="site-list"></tbody>
  </table>

  <!-- 관리자 메뉴 (로그인 후 표시) -->
  <div id="admin-area" style="display:none;">
    <h2>사이트 추가</h2>
    <form id="add-site-form">
      <input type="text" id="siteName" placeholder="사이트 이름" />
      <input type="url" id="siteUrl" placeholder="사이트 주소" />
      <button type="submit">추가</button>
    </form>
  </div>
</body>
</html>
