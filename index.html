<!DOCTYPE html>
<html>
<head>
  <title>사이트 선택</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <!-- 메인 섹션 -->
  <div class="main-section">
    <h1>사이트 선택</h1>

    <!-- 카테고리 박스 -->
    <div class="category-boxes">
      <div class="category-card" id="school-sites">
        <h2>학교 사이트</h2>
      </div>
      <div class="category-card" id="tool-sites">
        <h2>도구 사이트</h2>
      </div>
    </div>
  </div>

  <!-- 모달 -->
  <div id="site-modal">
    <div id="site-modal-box">
      <h2 id="modal-title"></h2>
      <div id="site-icons"></div>
      <button id="close-site-modal">닫기</button>
    </div>
  </div>

  <!-- 푸터 -->
  <footer class="footer-info">
    <p>학번 : </p>
    <p>이름 : </p>
    <p>과제 제출</p>
  </footer>
</body>
</html>
