<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사이트 목록</title>
    <link rel="stylesheet" href="style.css">

    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="slideshow">
        <img src="img/bg1.jpg" alt="예시 이미지1">
        <img src="img/bg2.jpg" alt="예시 이미지2">
        <img src="img/bg3.jpg" alt="예시 이미지3">
        <img src="img/bg4.jpg" alt="예시 이미지4">
    </div>

    <!-- 로그인/로그아웃 버튼 -->
    <div class="login-buttons">
        <button id="open-login">관리자 로그인</button>
        <!-- 관리자 로그인 시 표시될 요청 목록 버튼 -->
        <button id="open-requests" style="display:none;">요청 목록</button>
        <button id="logout-btn" style="display:none;">로그아웃</button>
    </div>

    <!-- 메인 섹션 -->
    <div class="main-section">
        <h1>대학생활에 도움이 되는 사이트 모음</h1>
        <h3>해당 웹 페이지는 대학 생활에 유용한 사이트들을 한곳에 모아 빠르게 접근할 수 있도록 지원합니다.</h3>

        <!-- 카테고리 카드 -->
        <div class="category-boxes">
            <div class="category-card" id="school-sites">
                <h2><i class="fa-solid fa-school"></i> 학교 사이트</h2>
            </div>
            <div class="category-card" id="tool-sites">
                <h2><i class="fa-solid fa-screwdriver-wrench"></i> 도구 사이트</h2>
            </div>
        </div>

        <!-- 사이트 요청하기 버튼 -->
        <div class="request-section">
            <button id="open-request">사이트 추가 요청하기</button>
        </div>
         
        <!-- 관리자 메뉴 -->
        <div id="admin-area" style="display:none;">
            <h2>사이트 추가</h2>
            <form id="add-site-form">
                <input type="text" id="siteName" placeholder="사이트 이름" />
                <input type="url" id="siteUrl" placeholder="사이트 주소" />
                <select id="siteCategory">
                    <option value="school">학교</option>
                    <option value="tool">도구</option>
                </select>
                <input type="text" id="siteIcon" placeholder="FontAwesome 아이콘 클래스명" />
                <input type="text" id="siteDescription" placeholder="사이트 설명" />
                <button type="submit">추가</button>
            </form>
        </div>
    </div>

    <!-- 로그인 모달 -->
    <div id="login-modal">
        <div id="login-box">
            <h2>관리자 로그인</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="아이디" /><br>
                <input type="password" id="password" placeholder="패스워드" /><br>
                <button type="submit">로그인</button>
                <button type="button" id="close-login">닫기</button>
            </form>
        </div>
    </div>

    <!-- 사이트 선택 모달 -->
    <div id="site-modal">
        <div id="site-modal-box">
            <h2 id="modal-title"></h2>
            <div id="site-icons"></div>
            <button id="close-site-modal">닫기</button>
        </div>
    </div>

    <!-- 사이트 수정 모달 -->
    <div id="edit-modal" style="display:none;">
        <div id="edit-box">
            <h2>사이트 수정</h2>
            <form id="edit-form">
                <input type="text" id="editName" placeholder="사이트 이름" />
                <input type="url" id="editUrl" placeholder="사이트 주소" />
                <select id="editCategory">
                    <option value="school">학교</option>
                    <option value="tool">도구</option>
                </select>
                <input type="text" id="editIcon" placeholder="FontAwesome 아이콘 클래스명" />
                <input type="text" id="editDescription" placeholder="사이트 설명" />
                <div class="button-group">
                    <button type="submit">저장</button>
                    <button type="button" id="close-edit">닫기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 사이트 요청 모달 -->
    <div id="request-modal">
        <div id="request-box">
            <h2>사이트 추가 요청하기</h2>
            <form id="request-form">
                <input type="text" id="reqName" placeholder="사이트 이름" />
                <input type="url" id="reqUrl" placeholder="사이트 주소" />
                <select id="reqCategory">
                    <option value="school">학교</option>
                    <option value="tool">도구</option>
                </select>
                <textarea id="reqReason" placeholder="요청 이유"></textarea>
                <button type="submit">요청 제출</button>
                <button type="button" id="close-request">닫기</button>
            </form>
        </div>
    </div>

    <!-- 요청 목록 모달 (관리자용) -->
    <div id="requests-modal">
        <div id="requests-box">
            <h2>요청 목록</h2>
            <table id="requests-table">
                <thead>
                    <tr>
                        <th>이름</th><th>URL</th><th>카테고리</th><th>이유</th><th class="manage">관리</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <!-- 페이지네이션 영역 -->
            <div id="pagination"></div>
            <button id="close-requests">닫기</button>
        </div>
    </div>

    <!-- 푸터 -->
    <footer class="footer-info">
        <p>해당 사이트는 소프트웨어공학 과제 제출용으로 제작된 웹 페이지입니다.</p>
        <p></p>
        <p>소프트웨어공학 과제 제출 - 소프트웨어전공 2226050</p>
    </footer>
</body>
</html>
